name: Build Windows

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:   # eseguibile manualmente dal sito GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Dipendenze npm ───────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Build Tauri (produce .msi e .exe NSIS) ──────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "AutoBridge Win ${{ github.ref_name }}"
          releaseBody:   "Installer Windows per AutoBridge Win"
          releaseDraft:  false
          prerelease:    false

      # ── Salva artefatti (disponibili anche senza tag) ────────────────────────
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autobridge-win-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
